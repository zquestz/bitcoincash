# Herb linter configuration.
# Version is pinned so upgrading Herb won't silently enable newly-introduced
# rules (they'd be gated until this version is bumped intentionally).
version: "0.10.1"

linter:
  rules:
    # Disabled: this is a static site served by nginx with no per-request
    # rendering, so a real CSP nonce (which must be unique and unpredictable
    # per response) cannot be generated. A build-time nonce would be identical
    # on every response and provide no protection, so the rule doesn't apply.
    html-require-script-nonce:
      enabled: false
